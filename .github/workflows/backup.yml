# Nightly encrypted DB backup — Hubble WMS
# Lives in HE-cells/hubble-wms-backups as .github/workflows/backup.yml
# (this copy in supabase/backups/ is the local source of truth — keep in sync).
#
# Security posture (accepted 2026-06-12):
#  - connection string only in the SUPABASE_DB_URL secret, never echoed
#  - dumps age-encrypted before commit (public key in repo variable; private key offline)
#  - read-only backup_role, NOT postgres
#  - pinned action SHAs, permissions: contents: write only

name: nightly-db-backup

on:
  schedule:
    - cron: '0 18 * * *' # 18:00 UTC = 01:00 ICT next day (GH cron may drift 5-30 min)
  workflow_dispatch: {}

permissions:
  contents: write

# Never let two runs (cron + a manual dispatch) race on the same push.
concurrency:
  group: nightly-db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # a healthy dump finishes in seconds; 30 min = "something hung" kill-switch
    env:
      PG_MAJOR: '17' # must be >= the Supabase Postgres major (Dashboard -> Settings -> Infrastructure)
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (Node 24)

      - name: Install pg_dump + age
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl --fail -sS -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends "postgresql-client-${PG_MAJOR}" age

      - name: Dump + encrypt
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          AGE_PUBLIC_KEY: ${{ vars.AGE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          STAMP="$(TZ=Asia/Bangkok date +%Y%m%d)"
          mkdir -p daily monthly
          "/usr/lib/postgresql/${PG_MAJOR}/bin/pg_dump" "$DB_URL" \
            --schema=public --schema=auth --no-owner --no-privileges \
          | gzip -9 \
          | age -r "$AGE_PUBLIC_KEY" -o "daily/wms_${STAMP}.sql.gz.age"
          # fail loudly on a suspiciously small dump (empty DB dump still > 2 KB gzipped)
          [ "$(stat -c%s "daily/wms_${STAMP}.sql.gz.age")" -gt 2048 ]

      - name: Monthly promote + retention (30 daily / 12 monthly)
        run: |
          set -euo pipefail
          STAMP="$(TZ=Asia/Bangkok date +%Y%m%d)"
          if [ "$(TZ=Asia/Bangkok date +%d)" = "01" ]; then
            cp "daily/wms_${STAMP}.sql.gz.age" "monthly/wms_${STAMP}.sql.gz.age"
          fi
          ls -1 daily   | sort -r | tail -n +31 | while read -r f; do rm -f "daily/$f"; done
          ls -1 monthly | sort -r | tail -n +13 | while read -r f; do rm -f "monthly/$f"; done
          # note: git history still retains pruned files forever - that's fine, they're encrypted

      - name: Commit + push
        run: |
          set -euo pipefail
          git config user.name  "wms-backup-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A daily monthly
          git commit -m "backup $(TZ=Asia/Bangkok date +%F)" || { echo "nothing to commit"; exit 0; }
          git push
